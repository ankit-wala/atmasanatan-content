review_note: "Reviewed 2026-06-14. Facts verified: Surapadman's boon (Shiva's son only), 6-day war ending Shashthi, mango-tree transformation → vel splits → peacock + rooster — all correct per Skanda Purana/Tamil tradition. Birth sequence (tejas → Agni → sarovara → 6 reeds → 6 babies → Krittikas → Parvati unites) is an accepted simplified telling. Two fixes applied to hi.md: (1) grammar error 'देवताओं ने... गए' → 'देवता... गए'; (2) pronoun inconsistency 'वे तेज... गिरे' → 'वह तेज... गिरा'. All named characters use वे/उन्होंने correctly. All 5 sections present. Phala-shruti present. Mantra format clean. date_2026/date_2027 remain TODO-VERIFY — do not publish until DrikPanchang confirmed."
